global
    log /dev/log local0
    log /dev/log local1 notice
    daemon
    maxconn 10000

defaults
    mode http
    log global
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client 75s
    timeout server 75s
    timeout http-request 10s
    timeout http-keep-alive 60s
    timeout tunnel 1h

frontend fe_http
    bind *:80
    http-request redirect scheme https code 301 unless { ssl_fc }

frontend fe_https
    bind *:443 ssl crt /etc/haproxy/certs/backend.tinguilin.yaba-in.com.pem alpn h2,http/1.1
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-Frame-Options SAMEORIGIN
    http-response set-header Referrer-Policy strict-origin-when-cross-origin

    http-request set-header X-Forwarded-Proto https if { ssl_fc }
    http-request set-header X-Forwarded-For %[src]

    acl is_socketio path_beg /socket.io/
    use_backend be_socketio if is_socketio
    default_backend be_api

backend be_api
    balance roundrobin
    option httpchk GET /health/ready
    http-check expect status 200

    cookie SRV insert indirect nocache secure httponly
    server api1 127.0.0.1:3001 check cookie a1 inter 3s fall 3 rise 2
    server api2 127.0.0.1:3002 check cookie a2 inter 3s fall 3 rise 2
    server api3 127.0.0.1:3003 check cookie a3 inter 3s fall 3 rise 2

backend be_socketio
    balance source
    option httpchk GET /health/ready
    http-check expect status 200

    server api1 127.0.0.1:3001 check inter 3s fall 3 rise 2
    server api2 127.0.0.1:3002 check inter 3s fall 3 rise 2
    server api3 127.0.0.1:3003 check inter 3s fall 3 rise 2
